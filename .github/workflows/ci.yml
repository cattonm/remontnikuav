name: CI

# Ганяється на кожен пуш і кожен PR у main.
# Мета проста: битий коміт більше НІКОЛИ не поїде на Render тихо.
# Історія: деплой падав на ModuleNotFoundError, Render мовчки лишав живою
# стару версію — і кімнати не тарифікувались, хоча код у репо був правильний.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Синтаксис · Імпорт · Тести
    runs-on: ubuntu-latest

    # Одноразовий Postgres для перевірки міграцій. Живе стільки ж, скільки джоба.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Встановити залежності
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pdfplumber   # pdfplumber — лише щоб тести читали вміст PDF

      - name: Синтаксис усіх .py
        run: python -m compileall -q . -x '\.git'

      # Міграції ганяємо на СПРАВЖНЬОМУ Postgres (сервіс нижче).
      # Ловить: битий SQL, порушений порядок, неідемпотентний накат.
      # Двічі підряд — бо на проді база вже непорожня, і повторний
      # накат мусить бути безпечним.
      - name: Міграції БД (чистий накат + повтор)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci
        run: |
          python migrate.py up
          python migrate.py up
          python migrate.py status

      # Прайс мусить лягати в БД і збігатися з кодом до копійки.
      - name: Імпорт прайсу в БД і звірка
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci
        run: |
          python import_prices.py --from-defaults
          python import_prices.py --from-defaults --check

      # Тести ганяємо ПІСЛЯ міграцій: інтеграційні тести авторизації
      # (tests/test_security_pg.py) працюють зі справжніми таблицями і
      # без DATABASE_URL просто пропускаються. Саме тут перевіряється, що
      # інвайт неможливо погасити двічі.
      - name: Тести (калькулятор, міграції, авторизація, прайс)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci
          BOT_TOKEN: '123456789:AAHfakeTokenForCiImportCheck_000000000'
          GEMINI_API_KEY: 'fake'
          GOOGLE_CREDS_JSON: '{}'
          RENDER_EXTERNAL_URL: 'https://example.onrender.com'
          SESSION_SECRET: 'ci-secret'
          PRICES_BACKEND: postgres
          AUTH_BACKEND: postgres
        run: python -m pytest tests/ -q

      # Найважливіший крок: імітуємо старт на Render з фейковими env.
      # Саме тут ловиться "забув закомітити модуль" — той самий баг,
      # через який прод місяцями крутив стару версію.
      - name: Імпорт main.py (імітація старту на Render)
        env:
          BOT_TOKEN: '123456789:AAHfakeTokenForCiImportCheck_000000000'
          GEMINI_API_KEY: 'fake'
          GOOGLE_CREDS_JSON: '{}'
          RENDER_EXTERNAL_URL: 'https://example.onrender.com'
        run: |
          python -c "
          import main
          assert hasattr(main, 'api_live_calc'), 'немає ендпоінта live_calc'
          assert hasattr(main, 'api_version'), 'немає ендпоінта /version'
          assert main.DEFAULT_PRICES, 'порожній прайс'
          print('OK: main.py імпортується, ендпоінти на місці')
          "
